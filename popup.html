<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      margin: 0;
      background-color: #0f0f0f;
      color: #f1f1f1;
      text-align: center;
    }
    h3 { margin: 0 0 12px 0; font-size: 16px; color: #ff0000; }
    .counter-box { font-size: 32px; font-weight: bold; margin: 10px 0; color: #ffffff; transition: color 0.3s ease-out; }
    .label { font-size: 12px; color: #aaa; }
    .status-ok { color: #2ecc71; font-weight: bold; font-size: 12px; margin-top: 10px; }
    .status-blocked { color: #e74c3c; font-weight: bold; font-size: 12px; margin-top: 10px; }
    
    /* New Add Time Button Styles Layout */
    .add-btn {
      margin-top: 12px;
      width: 100%;
      background-color: #ff0000;
      color: #ffffff;
      border: none;
      padding: 8px 0;
      font-weight: bold;
      border-radius: 18px;
      cursor: pointer;
      font-size: 12px;
      transition: background-color 0.2s;
    }
    .add-btn:hover { background-color: #cc0000; }
    .add-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <h3>YT Video Limiter</h3>
  <div class="label">Remaining Playtime Left:</div>
  <div class="counter-box" id="count">00:00</div>
  
  <div class="label" id="limit-label">Limit: 10 Mins / Hour</div>
  <div class="label" id="reset-label" style="color: #2ecc71; margin-top: 2px;">Next Reset: --:--</div>
  <div id="status" class="status-ok">Status: Streaming Allowed ✅</div>

  <!-- Interactive Time Add Trigger Button Element -->
  <button id="add-time-btn" class="add-btn"></button>

  <script src="popup.js"></script>
</body>
</html>
